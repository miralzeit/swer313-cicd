spring.application.name=hotel-booking-api
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hotel_booking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true

security.jwt.secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
security.jwt.issuer=${JWT_ISSUER:hotel-booking}
security.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:15}
security.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:7}
security.jwt.cleanup-interval-ms=${JWT_CLEANUP_INTERVAL_MS:86400000}
security.require-https=${REQUIRE_HTTPS:false}

# Swagger toggle
swagger.enabled=${SWAGGER_ENABLED:true}

# Uploaded catalog photos
app.upload.photo-dir=${UPLOAD_DIR:uploads/photos}
app.upload.photo-max-size-bytes=${PHOTO_MAX_SIZE_BYTES:5242880}
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:5MB}
