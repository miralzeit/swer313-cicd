spring.datasource.url=jdbc:h2:mem:test_hotel;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# OAuth client registration must be non-empty when oauth2-client is on classpath; values are not used in API tests.
spring.security.oauth2.client.registration.google.client-id=test-local-placeholder
spring.security.oauth2.client.registration.google.client-secret=test-local-placeholder
