services:
  mysql:
    image: mysql:8.4
    container_name: hotel-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hotel_booking
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: hotel-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/hotel_booking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: rootpass
      JWT_SECRET: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      UPLOAD_DIR: /app/uploads/photos
      SWAGGER_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

volumes:
  mysql-data:
  uploads:
